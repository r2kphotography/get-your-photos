<!DOCTYPE html>
<html>
<head>
  <title>R2K Photography</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
      box-sizing: border-box;

      background: linear-gradient(
        45deg,
        #000000,
        #1a1400,
        #000000,
        #2b2100,
        #000000
      );
      background-size: 400% 400%;
      animation: goldMove 12s ease infinite;
    }

    @keyframes goldMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .box {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      padding: 35px 25px;
      border-radius: 22px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      width: 60px;
      margin-bottom: 18px;
      filter: drop-shadow(0 0 8px gold);
    }

    h2 { font-size: 22px; margin-bottom: 15px; }
    .rating { color: gold; font-size: 14px; margin-bottom: 18px; }
    p { font-size: 14px; margin-bottom: 25px; }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    button {
      padding: 15px;
      border-radius: 35px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    .review { background: gold; color: black; }
    .tutorial { background: #0072ff; color: white; }
    .continue { background: #00cc66; color: black; display: none; }

    /* TOP RIGHT ICONS */
    .float-buttons {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 12px;
    }

    .float-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .float-btn img { width: 24px; }

    .whatsapp { background: #25D366; }
    .instagram { background: #d62976; }

    /* POPUP MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      text-align: center;
      padding: 20px;
    }

    .modal-content {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      max-width: 350px;
    }

    .stars {
      font-size: 30px;
      color: gold;
      animation: starGlow 1.5s infinite alternate;
    }

    @keyframes starGlow {
      from { text-shadow: 0 0 10px gold; }
      to { text-shadow: 0 0 20px orange; }
    }

    .modal button {
      margin-top: 20px;
      background: gold;
      color: black;
    }

  </style>
</head>

<body>

<div class="box">
  <img src="logo.png" class="logo">
  <h2>Welcome to R2K Photography 📸</h2>
  <div class="rating">⭐ 5.0 Rating | 1000+ Happy Clients</div>
  <p>Please give us a 5 ⭐⭐⭐⭐⭐ Star Google Review to continue</p>

  <div class="btn-group">
    <button class="review" onclick="showModal()">Give Review</button>
    <button class="tutorial" onclick="openTutorial()">Watch Tutorial</button>
    <button class="continue" id="continueBtn" onclick="goNext()">Continue ➜</button>
  </div>
</div>

<!-- POPUP -->
<div class="modal" id="reviewModal">
  <div class="modal-content">
    <h3>Please give us 5 Stars ⭐</h3>
    <div class="stars">⭐⭐⭐⭐⭐</div>
    <p>Tap 5 stars on Google and submit your review ❤️</p>
    <button onclick="openReview()">Continue to Google Review</button>
  </div>
</div>

<div class="float-buttons">
  <a href="https://wa.me/919003771199?text=Hi%20R2K%20Photography,%20I%20am%20interested%20in%20your%20services."
     class="float-btn whatsapp" target="_blank">
     <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
  </a>

  <a href="https://instagram.com/r2kphotography"
     class="float-btn instagram" target="_blank">
     <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
  </a>
</div>

<script>
  let reviewClicked = false;

  function showModal() {
    document.getElementById("reviewModal").style.display = "flex";
  }

  function openReview() {
    reviewClicked = true;
    document.getElementById("reviewModal").style.display = "none";
    window.open("https://g.page/r/CSrtOdkKuR7CEBM/review", "_blank");
  }

  function openTutorial() {
    window.open("tutorial.mp4", "_blank");
  }

  function goNext() {
    window.location.href = "https://ptml.in/hyw5/2ih9x";
  }

  window.addEventListener("focus", function() {
    if (reviewClicked) {
      document.getElementById("continueBtn").style.display = "block";
    }
  });
</script>

</body>
</html>
