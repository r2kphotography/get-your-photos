<!DOCTYPE html>
<html>
<head>
  <title>R2K Photography</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    /* Animated Gold Border */
    .box {
      position: relative;
      padding: 35px 25px;
      border-radius: 22px;
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .box::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 24px;
      padding: 2px;
      background: linear-gradient(90deg, gold, transparent, gold);
      background-size: 300% 300%;
      animation: borderMove 4s linear infinite;
      z-index: -1;
    }

    @keyframes borderMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .logo {
      width: 60px;
      margin: 0 auto 18px;
      display: block;
      filter: drop-shadow(0 0 8px rgba(255,215,0,0.6));
    }

    h2 {
      font-size: 22px;
      margin: 10px 0 15px;
    }

    .rating {
      color: gold;
      font-size: 14px;
      margin-bottom: 18px;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    button {
      padding: 15px;
      border-radius: 35px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }

    .review {
      background: linear-gradient(45deg, gold, #ffd700);
      color: black;
      box-shadow: 0 0 18px rgba(255,215,0,0.7);
    }

    .tutorial {
      background: linear-gradient(45deg, #00c3ff, #0072ff);
      color: white;
      box-shadow: 0 0 15px rgba(0,195,255,0.7);
    }

    .continue {
      background: linear-gradient(45deg, #00ff99, #00cc66);
      color: black;
      display: none;
      box-shadow: 0 0 15px rgba(0,255,153,0.7);
    }

    /* Floating Buttons Container */
    .float-buttons {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 1000;
    }

    .float-btn {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
      transition: 0.3s;
    }

    .float-btn img {
      width: 30px;
      height: 30px;
    }

    /* WhatsApp Pulse Animation */
    .whatsapp {
      background: #25D366;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37,211,102,0.7); }
      70% { box-shadow: 0 0 0 15px rgba(37,211,102,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
    }

    .instagram {
      background: radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf);
    }

    .float-btn:hover {
      transform: scale(1.1);
    }

  </style>
</head>

<body>

<div class="box">

  <img src="logo.png" class="logo">

  <h2>Welcome to R2K Photography 📸</h2>

  <div class="rating">
    ⭐ 5.0 Rating | 1000+ Happy Clients
  </div>

  <p>Please give us a 5 ⭐⭐⭐⭐⭐ Star Google Review to continue</p>

  <div class="btn-group">
    <button class="review" onclick="openReview()">Give Review</button>
    <button class="tutorial" onclick="openTutorial()">Watch Tutorial</button>
    <button class="continue" id="continueBtn" onclick="goNext()">Continue ➜</button>
  </div>

</div>

<!-- Floating Buttons -->
<div class="float-buttons">

  <!-- WhatsApp with Auto Message -->
  <a href="https://wa.me/919003771199?text=Hi%20R2K%20Photography,%20I%20am%20interested%20in%20your%20services."
     class="float-btn whatsapp" target="_blank">
     <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
  </a>

  <!-- Instagram -->
  <a href="https://instagram.com/your_instagram_username"
     class="float-btn instagram" target="_blank">
     <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
  </a>

</div>

<script>

  let reviewClicked = false;

  function openReview() {
    reviewClicked = true;
    window.open("https://g.page/r/CSrtOdkKuR7CEBM/review", "_blank");
  }

  function openTutorial() {
    window.open("tutorial.mp4", "_blank");
  }

  function goNext() {
    window.location.href = "https://ptml.in/hyw5/2ih9x";
  }

  window.addEventListener("focus", function() {
    if (reviewClicked) {
      document.getElementById("continueBtn").style.display = "block";
    }
  });

</script>

</body>
</html>
