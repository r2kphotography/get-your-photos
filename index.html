<!DOCTYPE html>
<html>
<head>
  <title>R2K Photography</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    body {
      height: 100dvh; /* Mobile stable height */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      color: white;
    }

    /* Moving Gold Background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,215,0,0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,215,0,0.15), transparent 40%);
      animation: moveGlow 12s linear infinite;
      z-index: -1;
    }

    @keyframes moveGlow {
      0% { transform: translate(0,0); }
      50% { transform: translate(-6%, -6%); }
      100% { transform: translate(0,0); }
    }

    .box {
      width: 90%;
      max-width: 380px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      padding: 30px 20px;
      border-radius: 20px;
      text-align: center;
    }

    .logo {
      width: 55px;
      margin-bottom: 15px;
      filter: drop-shadow(0 0 8px rgba(255,215,0,0.6));
    }

    h2 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .rating {
      color: gold;
      font-size: 13px;
      margin-bottom: 15px;
    }

    p {
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    button {
      padding: 14px;
      border-radius: 30px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
    }

    .review {
      background: linear-gradient(45deg, gold, #ffd700);
      color: black;
      box-shadow: 0 0 15px rgba(255,215,0,0.7);
    }

    .tutorial {
      background: linear-gradient(45deg, #00c3ff, #0072ff);
      color: white;
      box-shadow: 0 0 12px rgba(0,195,255,0.7);
    }

    .continue {
      background: linear-gradient(45deg, #00ff99, #00cc66);
      color: black;
      display: none;
      box-shadow: 0 0 12px rgba(0,255,153,0.7);
    }

    button:active {
      transform: scale(0.95);
    }

    /* Floating Buttons */
    .float-buttons {
      position: fixed;
      bottom: 18px;
      right: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .float-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .float-btn img {
      width: 28px;
      height: 28px;
    }

    .whatsapp {
      background: #25D366;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37,211,102,0.7); }
      70% { box-shadow: 0 0 0 14px rgba(37,211,102,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
    }

    .instagram {
      background: radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf);
    }

  </style>
</head>

<body>

<div class="box">

  <img src="logo.png" class="logo">

  <h2>Welcome to R2K Photography 📸</h2>

  <div class="rating">
    ⭐ 5.0 Rating | 1000+ Happy Clients
  </div>

  <p>Please give us a 5 ⭐⭐⭐⭐⭐ Star Google Review to continue</p>

  <div class="btn-group">
    <button class="review" onclick="openReview()">Give Review</button>
    <button class="tutorial" onclick="openTutorial()">Watch Tutorial</button>
    <button class="continue" id="continueBtn" onclick="goNext()">Continue ➜</button>
  </div>

</div>

<div class="float-buttons">
  <a href="https://wa.me/91903771199?text=Hi%20R2K%20Photography,%20I%20am%20interested%20in%20your%20services."
     class="float-btn whatsapp" target="_blank">
     <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
  </a>

  <a href="https://instagram.com/r2kphotography"
     class="float-btn instagram" target="_blank">
     <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
  </a>
</div>

<script>
  let reviewClicked = false;

  function openReview() {
    reviewClicked = true;
    window.open("https://g.page/r/CSrtOdkKuR7CEBM/review", "_blank");
  }

  function openTutorial() {
    window.open("tutorial.mp4", "_blank");
  }

  function goNext() {
    window.location.href = "https://ptml.in/hyw5/2ih9x";
  }

  window.addEventListener("focus", function() {
    if (reviewClicked) {
      document.getElementById("continueBtn").style.display = "block";
    }
  });
</script>

</body>
</html>
